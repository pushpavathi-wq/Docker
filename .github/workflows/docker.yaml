name: CI-CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 1. Get infra details from Terraform
    - name: Get Terraform outputs
      id: tf
      run: |
        echo "ECR_REPO=$(terraform output -raw ecr_repo_url)" >> $GITHUB_ENV
        echo "ECS_CLUSTER=$(terraform output -raw ecs_cluster)" >> $GITHUB_ENV
        echo "ECS_SERVICE=$(terraform output -raw ecs_service)" >> $GITHUB_ENV

    # 2. Login to ECR
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 3. Build Docker image
    - name: Build image
      run: |
        IMAGE_URI=$ECR_REPO:latest
        docker build -t $IMAGE_URI .
        echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

    # 4. Push image
    - name: Push image
      run: docker push $IMAGE_URI

    # 5. Deploy to ECS
    - name: Deploy
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment
